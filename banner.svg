<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" width="900" height="300">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#020810"/>
      <stop offset="50%"  stop-color="#060d1f"/>
      <stop offset="100%" stop-color="#020810"/>
    </linearGradient>

    <!-- Title gradient (cyan → violet → cyan) -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="40%"  stop-color="#818cf8"/>
      <stop offset="70%"  stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#00e5ff" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#c084fc" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>

    <!-- Left orb glow -->
    <radialGradient id="orbL" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Right orb glow -->
    <radialGradient id="orbR" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c084fc" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>

    <!-- Text glow filter -->
    <filter id="glow" x="-15%" y="-40%" width="130%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot filter for nodes -->
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="45" height="45" patternUnits="userSpaceOnUse">
      <path d="M 45 0 L 0 0 0 45" fill="none" stroke="#0d1f38" stroke-width="0.6"/>
    </pattern>

    <!-- Dot grid pattern -->
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.7" fill="#1a3a5c" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- ── Base ── -->
  <rect width="900" height="300" fill="url(#bgGrad)"/>
  <rect width="900" height="300" fill="url(#grid)"/>
  <rect width="900" height="300" fill="url(#dots)"/>

  <!-- ── Glow orbs ── -->
  <ellipse cx="160" cy="150" rx="200" ry="140" fill="url(#orbL)"/>
  <ellipse cx="740" cy="150" rx="200" ry="140" fill="url(#orbR)"/>

  <!-- ── Neural network — left cluster ── -->
  <!-- edges -->
  <line x1="55"  y1="85"  x2="110" y2="145" stroke="#00e5ff" stroke-width="0.6" opacity="0.18"/>
  <line x1="110" y1="145" x2="70"  y2="210" stroke="#00e5ff" stroke-width="0.6" opacity="0.12"/>
  <line x1="55"  y1="85"  x2="160" y2="65"  stroke="#818cf8" stroke-width="0.6" opacity="0.15"/>
  <line x1="35"  y1="160" x2="55"  y2="85"  stroke="#c084fc" stroke-width="0.6" opacity="0.18"/>
  <line x1="35"  y1="160" x2="70"  y2="210" stroke="#c084fc" stroke-width="0.6" opacity="0.12"/>
  <line x1="110" y1="145" x2="160" y2="65"  stroke="#818cf8" stroke-width="0.6" opacity="0.10"/>
  <line x1="160" y1="65"  x2="200" y2="120" stroke="#00e5ff" stroke-width="0.6" opacity="0.12"/>
  <line x1="200" y1="120" x2="110" y2="145" stroke="#00e5ff" stroke-width="0.6" opacity="0.08"/>
  <!-- nodes -->
  <circle cx="55"  cy="85"  r="3.5" fill="#00e5ff" opacity="0.7" filter="url(#dotGlow)"/>
  <circle cx="110" cy="145" r="2.5" fill="#00e5ff" opacity="0.5" filter="url(#dotGlow)"/>
  <circle cx="70"  cy="210" r="4"   fill="#c084fc" opacity="0.5" filter="url(#dotGlow)"/>
  <circle cx="160" cy="65"  r="2"   fill="#818cf8" opacity="0.6" filter="url(#dotGlow)"/>
  <circle cx="35"  cy="160" r="3"   fill="#c084fc" opacity="0.6" filter="url(#dotGlow)"/>
  <circle cx="200" cy="120" r="2"   fill="#00e5ff" opacity="0.4" filter="url(#dotGlow)"/>

  <!-- ── Neural network — right cluster ── -->
  <line x1="845" y1="85"  x2="790" y2="145" stroke="#00e5ff" stroke-width="0.6" opacity="0.18"/>
  <line x1="790" y1="145" x2="830" y2="210" stroke="#00e5ff" stroke-width="0.6" opacity="0.12"/>
  <line x1="845" y1="85"  x2="740" y2="65"  stroke="#818cf8" stroke-width="0.6" opacity="0.15"/>
  <line x1="865" y1="160" x2="845" y2="85"  stroke="#c084fc" stroke-width="0.6" opacity="0.18"/>
  <line x1="865" y1="160" x2="830" y2="210" stroke="#c084fc" stroke-width="0.6" opacity="0.12"/>
  <line x1="790" y1="145" x2="740" y2="65"  stroke="#818cf8" stroke-width="0.6" opacity="0.10"/>
  <line x1="740" y1="65"  x2="700" y2="120" stroke="#00e5ff" stroke-width="0.6" opacity="0.12"/>
  <line x1="700" y1="120" x2="790" y2="145" stroke="#00e5ff" stroke-width="0.6" opacity="0.08"/>
  <!-- nodes -->
  <circle cx="845" cy="85"  r="3.5" fill="#00e5ff" opacity="0.7" filter="url(#dotGlow)"/>
  <circle cx="790" cy="145" r="2.5" fill="#00e5ff" opacity="0.5" filter="url(#dotGlow)"/>
  <circle cx="830" cy="210" r="4"   fill="#c084fc" opacity="0.5" filter="url(#dotGlow)"/>
  <circle cx="740" cy="65"  r="2"   fill="#818cf8" opacity="0.6" filter="url(#dotGlow)"/>
  <circle cx="865" cy="160" r="3"   fill="#c084fc" opacity="0.6" filter="url(#dotGlow)"/>
  <circle cx="700" cy="120" r="2"   fill="#00e5ff" opacity="0.4" filter="url(#dotGlow)"/>

  <!-- ── Top accent bar ── -->
  <rect x="0" y="0" width="900" height="1.5" fill="url(#lineGrad)" opacity="0.8"/>

  <!-- ── Side edge accents ── -->
  <rect x="0"   y="0" width="2" height="300" fill="#00e5ff" opacity="0.15"/>
  <rect x="898" y="0" width="2" height="300" fill="#c084fc" opacity="0.15"/>

  <!-- ── HUD corner brackets ── -->
  <!-- TL -->
  <path d="M 18 18 L 18 54 M 18 18 L 54 18" stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.55"/>
  <circle cx="18" cy="18" r="2" fill="#00e5ff" opacity="0.7"/>
  <!-- TR -->
  <path d="M 882 18 L 882 54 M 882 18 L 846 18" stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.55"/>
  <circle cx="882" cy="18" r="2" fill="#00e5ff" opacity="0.7"/>
  <!-- BL -->
  <path d="M 18 282 L 18 246 M 18 282 L 54 282" stroke="#c084fc" stroke-width="1.5" fill="none" opacity="0.55"/>
  <circle cx="18" cy="282" r="2" fill="#c084fc" opacity="0.7"/>
  <!-- BR -->
  <path d="M 882 282 L 882 246 M 882 282 L 846 282" stroke="#c084fc" stroke-width="1.5" fill="none" opacity="0.55"/>
  <circle cx="882" cy="282" r="2" fill="#c084fc" opacity="0.7"/>

  <!-- ── Horizontal scan line (center decorative) ── -->
  <line x1="240" y1="152" x2="360" y2="152" stroke="#00e5ff" stroke-width="0.5" opacity="0.18"/>
  <line x1="540" y1="152" x2="660" y2="152" stroke="#c084fc" stroke-width="0.5" opacity="0.18"/>

  <!-- ── Main title ── -->
  <text
    x="450" y="128"
    text-anchor="middle"
    font-family="'Courier New', 'Lucida Console', Monaco, monospace"
    font-size="50"
    font-weight="900"
    letter-spacing="7"
    fill="url(#titleGrad)"
    filter="url(#glow)">MIRACLE TECHLINK</text>

  <!-- ── Subtitle ── -->
  <text
    x="450" y="168"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="12.5"
    letter-spacing="4.5"
    fill="#4a7fa5"
    opacity="0.9">EMBODIED AI  ·  VLA TRAINING  ·  MEDICAL ROBOTICS</text>

  <!-- ── Thin divider ── -->
  <line x1="310" y1="186" x2="590" y2="186" stroke="url(#lineGrad)" stroke-width="0.6" opacity="0.35"/>

  <!-- ── Status row ── -->
  <!-- Pulsing dot -->
  <circle cx="348" cy="212" r="4" fill="#00e5ff" opacity="0.85" filter="url(#dotGlow)">
    <animate attributeName="opacity" values="0.85;0.25;0.85" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="4;5;4"           dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="362" y="217"
    font-family="'Courier New', monospace"
    font-size="11" letter-spacing="2.5"
    fill="#4a7fa5">TONGJI UNIV.</text>

  <!-- Separator -->
  <text x="460" y="217"
    font-family="'Courier New', monospace"
    font-size="11"
    fill="#1e3a5a">·</text>

  <!-- Right label -->
  <text x="476" y="217"
    font-family="'Courier New', monospace"
    font-size="11" letter-spacing="2.5"
    fill="#4a7fa5">PKU DLIB  ×  智元机器人</text>

  <!-- ── Tagline ── -->
  <text
    x="450" y="252"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="11.5"
    letter-spacing="6"
    fill="#6d28d9"
    opacity="0.55">LINK TECH · LINK PEOPLE · LINK FUTURE</text>

  <!-- ── Bottom accent bar ── -->
  <rect x="0" y="298.5" width="900" height="1.5" fill="url(#lineGrad)" opacity="0.5"/>
</svg>
